<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login to Berr</h1>
        </div>
        <form action="">
            <label for="">Username or Email</label>
            <input type="text" class="abc" id="de">
            <label for="">Password</label>
            <input type="password" class="abc" id="fg">
            <a href="#">Forgot Password?</a>
            <input type="submit" value="Login" class="login">
        </form>
        <div class="footer">
            <h3>Login with another account?</h3>
            <div class="images">
                <img src="images/google.jpeg" alt="google">
                <img src="images/facebook.png" alt="facebook">
                <img src="images/twitter.png" alt="twitter">
                <img src="images/steam.jpeg" alt="steam">
                <img src="images/pinterest.jpeg" alt="pinterest">
            </div>
        </div>
    </div>

</body>
</html>
